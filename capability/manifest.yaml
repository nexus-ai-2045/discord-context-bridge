schema: discord_context_bridge_capability_manifest.v1
name: discord-context-bridge
display_name: Discord Context Bridge
ssot_repo: nexus-ai-2045/discord-context-bridge
contract_path: docs/operating-contract.md
default_entrypoint: discord-context-bridge
runtime_targets:
  - codex
  - claude-code
  - grok
  - antigravity
stoplines:
  - no_discord_send
  - no_external_share
  - no_raw_discord_text_in_visible_output
  - no_tokens_or_cookies
  - no_playwright_default_for_discord_context
  - no_unapproved_visible_ui_automation
  - no_complete_claim_without_full_local_capture
required_commands:
  - command: import-visible-text
    purpose: 可視テキストをローカル event store に取り込む
  - command: context-passport
    purpose: 可視テキストから文脈カードを作る
  - command: guide-reply
    purpose: 可視テキストと下書きから返信前ガイドを作る
  - command: review-draft
    purpose: 下書きの文脈適合・トーン・不足前提を確認する
verification_commands:
  - command: python3 scripts/verify_ssot_projection.py --json
    purpose: SSOT から生成された runtime skill が最新か確認する
  - command: python3 scripts/lint_runtime_skill_sync.py --target codex=/path/to/SKILL.md --json
    purpose: runtime skill directory の実体が SSOT 生成物と一致するか read-only で確認する
  - command: python3 scripts/lint_ingest_route_policy.py --json
    purpose: Discord 文脈取得で Playwright を既定経路にしない運用を確認する
  - command: python3 scripts/ops_check.py --gh
    purpose: test / smoke / secret scan / GitHub account をまとめて確認する
